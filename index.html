<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>BoT Verify - AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #1a6b5a;
      --teal-light: #e8f4f1;
      --bg: #f0f2f1;
      --white: #ffffff;
      --border: #dde2e0;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --bot-bg: #ffffff;
      --user-bg: #1a6b5a;
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: #e8eae9; display: flex; align-items: center; justify-content: center; }
    .phone-frame { width: 390px; height: 844px; background: var(--bg); border-radius: 40px; border: 2px solid #c8ccc9; box-shadow: 0 20px 60px rgba(0,0,0,0.18); display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .header { background: var(--white); padding: 16px 20px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo { width: 32px; height: 32px; background: linear-gradient(135deg, #c0392b, #922b21); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .header-title { font-size: 17px; font-weight: 600; color: var(--text); }
    .header-title span { color: var(--teal); }
    .messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
    .message { display: flex; flex-direction: column; gap: 4px; animation: fadeUp 0.3s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .message.bot { align-items: flex-start; }
    .message.user { align-items: flex-end; }
    .bubble { padding: 13px 16px; border-radius: 18px; font-size: 14.5px; line-height: 1.6; max-width: 85%; word-break: break-word; }
    .message.bot .bubble { background: var(--bot-bg); color: var(--text); border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .message.user .bubble { background: var(--user-bg); color: white; border-bottom-right-radius: 4px; }
    .msg-time { font-size: 11px; color: var(--text-muted); padding: 0 4px; }
    .typing .bubble { display: flex; gap: 4px; align-items: center; padding: 16px 18px; }
    .dot { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
    .input-area { background: var(--white); border-top: 1px solid var(--border); padding: 12px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    #messageInput { flex: 1; border: 1.5px solid var(--border); border-radius: 24px; padding: 11px 18px; font-size: 14px; outline: none; background: var(--bg); transition: 0.2s; }
    #messageInput:focus { border-color: var(--teal); background: white; }
    .send-btn { padding: 11px 22px; background: var(--teal); border: none; border-radius: 24px; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .send-btn:disabled { opacity: 0.5; }
    .bottom-nav { background: var(--white); border-top: 1px solid var(--border); display: flex; padding: 10px 0 14px; flex-shrink: 0; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0.6; }
    .nav-item.active { opacity: 1; color: var(--teal); }
    .nav-label { font-size: 11px; font-weight: 600; }
  </style>
</head>
<body>
<div class="phone-frame">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">🛡</div>
      <div class="header-title">BoT <span>Verify</span></div>
    </div>
    <div class="header-icons"><span>⚙️</span></div>
  </div>

  <div class="messages" id="messages">
    <div class="message bot">
      <div class="bubble">Habari! I am the BoT Verification Assistant. How can I help you today?</div>
      <div class="msg-time">Now</div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Type your message..." onkeydown="if(event.key==='Enter') sendMessage()">
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
  </div>

  <div class="bottom-nav">
    <div class="nav-item"><div class="nav-icon">🛡</div><div class="nav-label">Scan</div></div>
    <div class="nav-item active"><div class="nav-icon">💬</div><div class="nav-label">AI Chat</div></div>
    <div class="nav-item"><div class="nav-icon">🗂</div><div class="nav-label">Portal</div></div>
  </div>
</div>

<script>
  // UPDATED URL: Based on your workflow trigger ID
  const WEBHOOK_URL = 'https://lyn.app.n8n.cloud/webhook/25aef645-6477-4039-bccd-506264e30ea5/chat';

  function appendMessage(role, text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    div.innerHTML = `<div class="bubble">${text}</div><div class="msg-time">${time}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function toggleTyping(show) {
    const existing = document.getElementById('typing-indicator');
    if (show && !existing) {
      const div = document.createElement('div');
      div.id = 'typing-indicator';
      div.className = 'message bot typing';
      div.innerHTML = `<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
      document.getElementById('messages').appendChild(div);
    } else if (!show && existing) {
      existing.remove();
    }
    const c = document.getElementById('messages');
    c.scrollTop = c.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('messageInput');
    const btn = document.getElementById('sendBtn');
    const text = input.value.trim();
    
    if (!text) return;

    // UI Updates
    input.value = '';
    input.disabled = true;
    btn.disabled = true;
    appendMessage('user', text);
    toggleTyping(true);

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        // IMPORTANT: Sending as 'chatInput' to match your AI Agent node
        body: JSON.stringify({ chatInput: text, sessionId: "user-123" })
      });

      if (!response.ok) throw new Error(`Server Error: ${response.status}`);

      const data = await response.json();
      toggleTyping(false);

      // Robust response parsing
      let botReply = "";
      if (Array.isArray(data)) {
          botReply = data[0]?.output || data[0]?.text || data[0]?.message || "No response content found.";
      } else {
          botReply = data.output || data.text || data.message || JSON.stringify(data);
      }

      appendMessage('bot', botReply);

    } catch (error) {
      console.error('Chat Error:', error);
      toggleTyping(false);
      appendMessage('bot', `⚠️ Connection Error: ${error.message}. Please check if your n8n workflow is Active.`);
    } finally {
      input.disabled = false;
      btn.disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
